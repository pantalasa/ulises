apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-merchant-web
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: merchant-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: merchant-web
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: merchant-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
