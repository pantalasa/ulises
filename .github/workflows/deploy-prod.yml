name: Deploy prod (merchant-web)
# Simulates Barclays' "promotion" step: promoting an already-staged artifact
# from dev ECR to prod ECR. No rebuild — same SHA as the staging deploy.
#
# Runs on the self-hosted `lunar` runner (hub creds + `lunar` CLI already
# available). Manual dispatch to reflect a deliberate promotion action.
#
# Gating flow (mirror of deploy-staging.yml, but with target_env=prod):
#   1) Overwrite .deploy.target_env=prod on this (component, SHA). Same SHA
#      that staged, so the release-ticket / vcs collectors already have
#      data. This flip causes the hub to re-evaluate — now the prod-only
#      block-release checks (bpl-prod-gate) ASSERT instead of skipping.
#   2) `lunar policy ok-release` blocks the promotion (exit 1) if any
#      block-release policy is failing for this commit with target_env=prod.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA already deployed to staging that you want to promote to prod'
        required: true

concurrency:
  group: prod-deploy-merchant-web
  cancel-in-progress: false

jobs:
  gate-and-promote:
    runs-on: lunar
    steps:
      - name: Resolve context
        id: ctx
        run: |
          SHA="${{ inputs.sha }}"
          COMPONENT="github.com/pantalasa/ulises/services/merchant-web"
          echo "sha=$SHA"        >> "$GITHUB_OUTPUT"
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"

      - name: Stamp target_env=prod
        env:
          SHA: ${{ steps.ctx.outputs.sha }}
          COMPONENT: ${{ steps.ctx.outputs.component }}
        run: |
          echo "==> Marking $COMPONENT @ $SHA with .deploy.target_env=prod"
          lunar collect --component "$COMPONENT" --sha "$SHA" .deploy.target_env prod
          # Settle window: the `collect` above enqueues a policy re-evaluation
          # that is not correlated with the ok-release --workflow-id below, so
          # ok-release could otherwise read the pre-stamp policy state and
          # return "allowed" against stale data. 30s empirically covers
          # re-eval latency on the demo hub with margin — bump higher for
          # heavier fleets.
          sleep 30

      - name: Lunar prod gate (ok-release)
        id: gate
        env:
          SHA: ${{ steps.ctx.outputs.sha }}
          COMPONENT: ${{ steps.ctx.outputs.component }}
        run: |
          echo "=========================================="
          echo "  Lunar Prod Gate — ok-release"
          echo "  Component: $COMPONENT"
          echo "  SHA:       $SHA"
          echo "  target_env: prod"
          echo "=========================================="
          set +e
          lunar policy ok-release "$COMPONENT" "$SHA" \
            --workflow-id "$GITHUB_RUN_ID" \
            --poll-interval 5s \
            --timeout 10m
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::Prod promotion BLOCKED — a block-release policy is failing for $COMPONENT @ $SHA (exit $rc)."
            exit $rc
          fi
          echo "Prod gate PASSED — proceeding with promotion."

      - name: Simulated prod promotion
        env:
          SHA: ${{ steps.ctx.outputs.sha }}
          COMPONENT: ${{ steps.ctx.outputs.component }}
        run: |
          echo "==> [simulated] copying $COMPONENT @ $SHA from dev ECR to prod ECR"
          echo "==> [simulated] Flux (prod) will now pick up the promoted image"

      - name: Record release event
        # Runs regardless of prior step outcomes so we capture denied gates too.
        # Stamps `.deploy.attempts.<run_id>` onto the SAME (component, sha) the
        # gate evaluated — steps.ctx.outputs.sha is the resolved input SHA, not
        # the workflow's ref sha, so this is drift-free even if the dispatched
        # SHA differs from main HEAD. `outcome` reflects the gate step
        # specifically (steps.gate.outcome), not the whole job — a downstream
        # deploy-step failure won't spuriously flip a passed gate to "denied".
        if: always()
        env:
          SHA:        ${{ steps.ctx.outputs.sha }}
          COMPONENT:  ${{ steps.ctx.outputs.component }}
          RUN_ID:     ${{ github.run_id }}
          RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AUTHOR:     ${{ github.actor }}
          TARGET_ENV: prod
          OUTCOME:    ${{ steps.gate.outcome == 'success' && 'published' || 'denied' }}
        run: |
          echo "==> Recording release event for $COMPONENT @ $SHA (run $RUN_ID, outcome=$OUTCOME)"
          lunar collect --component "$COMPONENT" --sha "$SHA" \
            ".deploy.attempts.$RUN_ID.release_time"     "$(date -u +%FT%TZ)" \
            ".deploy.attempts.$RUN_ID.release_author"   "$AUTHOR"            \
            ".deploy.attempts.$RUN_ID.target_env"       "$TARGET_ENV"        \
            ".deploy.attempts.$RUN_ID.outcome"          "$OUTCOME"           \
            ".deploy.attempts.$RUN_ID.workflow_run_url" "$RUN_URL"
